name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ifcopenshell pytest pytest-cov
          pip install -e .

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Test CLI import
        run: |
          python -c "from ifc_fm_checker.cli import main; print('CLI OK')"
          python -c "from ifc_fm_checker.config import SCORING_WEIGHTS; print('Config OK')"
          python -c "from ifc_fm_checker.runner import run_all_checks; print('Runner OK')"
